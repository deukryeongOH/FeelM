version: '3.8'

services:

  # react
  frontend:
    image: deukr/feelm-frontend:latest
    container_name: feelm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - feelm-network

  # spring boot
  backend:
    image: deukr/feelm-backend:latest
    container_name: feelm-backend
    ports:
      - "8080:8080"
#    depends_on:
#      - batch-service
#      - db # DB가 켜져야 백엔드도 켜짐 db랑 batch는 각각 RDS, LAMBDA로 갔으니 제외
    env_file: # .env 파일의 값 가져오기
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Seoul  # 한국 시간 설정
    networks:
      - feelm-network
networks:
  feelm-network:
    driver: bridge


